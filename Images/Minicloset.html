<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Sistema Comercial</title>

<style>
body {
    font-family: 'Segoe UI', Arial;
    background: #eef1f5;
    margin: 0;
}

header {
    background: #1f2937;
    color: white;
    padding: 15px;
    font-size: 20px;
}

.container {
    padding: 20px;
}

.card {
    background: white;
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.08);
    margin-bottom: 20px;
}

input, select, button {
    padding: 8px;
    margin: 5px;
    border-radius: 6px;
    border: 1px solid #ccc;
}

button {
    background: #2563eb;
    color: white;
    border: none;
    cursor: pointer;
}

button:hover {
    background: #1e40af;
}

table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 10px;
}

th {
    background: #f3f4f6;
}

th, td {
    padding: 10px;
    border-bottom: 1px solid #ddd;
    text-align: center;
}

.total {
    font-weight: bold;
    font-size: 18px;
    color: green;
}

.nav {
    margin-bottom: 20px;
}

.nav button {
    background: #374151;
}

.hidden {
    display: none;
}
</style>
</head>

<body>

<header>🛍 Sistema Comercial</header>

<div class="container">

<div class="nav">
    <button onclick="mostrarVenda()">Nova Venda</button>
    <button onclick="mostrarHistorico()">Histórico</button>
</div>

<!-- VENDA -->
<div id="telaVenda">

<div class="card">
<h3>Cliente</h3>
Nome: <input type="text" id="cliente">
Telefone: <input type="text" id="telefone">
</div>

<div class="card">
<h3>Produtos</h3>

Descrição: <input type="text" id="descricao">
Qtd: <input type="number" id="quantidade" value="1">
Valor: <input type="number" id="valor" step="0.01">
Desconto: <input type="number" id="desconto" value="0" step="0.01">
<button onclick="adicionarProduto()">Adicionar</button>

<table>
<thead>
<tr>
<th>Descrição</th>
<th>Qtd</th>
<th>Valor</th>
<th>Desc</th>
<th>Total</th>
<th>Ações</th>
</tr>
</thead>
<tbody id="listaProdutos"></tbody>
</table>

<div class="total">
Total: R$ <span id="totalGeral">0.00</span>
</div>
</div>

<div class="card">
<h3>Pagamentos</h3>

Forma:
<select id="formaPagamento">
<option value="dinheiro">Dinheiro</option>
<option value="credito">Crédito</option>
<option value="debito">Débito</option>
<option value="pix">PIX</option>
</select>

Valor: <input type="number" id="valorPagamento" step="0.01">
Parcelas (crédito): <input type="number" id="parcelas" value="1">

<button onclick="adicionarPagamento()">Adicionar</button>

<table>
<thead>
<tr>
<th>Forma</th>
<th>Valor</th>
<th>Detalhe</th>
<th>Ação</th>
</tr>
</thead>
<tbody id="listaPagamentos"></tbody>
</table>

<div class="total">
Pago: R$ <span id="totalPago">0.00</span><br>
Restante: R$ <span id="valorRestante">0.00</span>
</div>

<br>
<button onclick="finalizarVenda()">Finalizar Venda</button>

</div>
</div>

<!-- HISTORICO -->
<div id="telaHistorico" class="hidden">
<div class="card">
<h3>Histórico de Vendas</h3>

<table>
<thead>
<tr>
<th>Data</th>
<th>Cliente</th>
<th>Total</th>
<th>Ações</th>
</tr>
</thead>
<tbody id="listaHistorico"></tbody>
</table>

</div>
</div>

</div>

<script>

let produtos = [];
let pagamentos = [];
let historico = JSON.parse(localStorage.getItem("historico")) || [];

function atualizarTotais() {
    let total = produtos.reduce((s,p)=>s+p.total,0);
    document.getElementById("totalGeral").innerText = total.toFixed(2);

    let pago = pagamentos.reduce((s,p)=>s+p.valor,0);
    document.getElementById("totalPago").innerText = pago.toFixed(2);
    document.getElementById("valorRestante").innerText = (total-pago).toFixed(2);
}

function renderProdutos(){
    let tbody=document.getElementById("listaProdutos");
    tbody.innerHTML="";
    produtos.forEach((p,i)=>{
        let row=tbody.insertRow();
        row.innerHTML=`
        <td>${p.descricao}</td>
        <td>${p.qtd}</td>
        <td>${p.valor.toFixed(2)}</td>
        <td>${p.desconto.toFixed(2)}</td>
        <td>${p.total.toFixed(2)}</td>
        <td>
            <button onclick="excluirProduto(${i})">Excluir</button>
        </td>`;
    });
    atualizarTotais();
}

function adicionarProduto(){
    let descricao=descricao.value;
    let qtd=parseFloat(quantidade.value);
    let valor=parseFloat(document.getElementById("valor").value);
    let desconto=parseFloat(document.getElementById("desconto").value);
    let total=(qtd*valor)-desconto;

    produtos.push({descricao,qtd,valor,desconto,total});
    renderProdutos();
}

function excluirProduto(i){
    produtos.splice(i,1);
    renderProdutos();
}

function renderPagamentos(){
    let tbody=document.getElementById("listaPagamentos");
    tbody.innerHTML="";
    pagamentos.forEach((p,i)=>{
        let row=tbody.insertRow();
        row.innerHTML=`
        <td>${p.forma}</td>
        <td>${p.valor.toFixed(2)}</td>
        <td>${p.detalhe}</td>
        <td><button onclick="excluirPagamento(${i})">Excluir</button></td>`;
    });
    atualizarTotais();
}

function adicionarPagamento(){
    let forma=formaPagamento.value;
    let valor=parseFloat(valorPagamento.value);
    let parcelas=parseInt(parcelas.value);
    let detalhe="";

    if(forma==="credito"){
        detalhe=`${parcelas}x de R$ ${(valor/parcelas).toFixed(2)}`;
    }
    if(forma==="dinheiro"){
        let total=produtos.reduce((s,p)=>s+p.total,0);
        let troco=valor-total;
        if(troco>0) detalhe="Troco: R$ "+troco.toFixed(2);
    }

    pagamentos.push({forma,valor,detalhe});
    renderPagamentos();
}

function excluirPagamento(i){
    pagamentos.splice(i,1);
    renderPagamentos();
}

function finalizarVenda(){
    let venda={
        data:new Date().toLocaleString(),
        cliente:cliente.value,
        telefone:telefone.value,
        produtos,
        pagamentos,
        total:produtos.reduce((s,p)=>s+p.total,0)
    };

    historico.push(venda);
    localStorage.setItem("historico",JSON.stringify(historico));

    gerarComprovante(venda);

    produtos=[];
    pagamentos=[];
    renderProdutos();
    renderPagamentos();
    alert("Venda finalizada!");
}

function renderHistorico(){
    let tbody=document.getElementById("listaHistorico");
    tbody.innerHTML="";
    historico.forEach((v,i)=>{
        let row=tbody.insertRow();
        row.innerHTML=`
        <td>${v.data}</td>
        <td>${v.cliente}</td>
        <td>R$ ${v.total.toFixed(2)}</td>
        <td><button onclick="gerarComprovante(historico[${i}])">Comprovante</button></td>`;
    });
}

function gerarComprovante(venda){
    let win=window.open("","_blank");
    win.document.write(`
        <h2>Comprovante</h2>
        <p>Data: ${venda.data}</p>
        <p>Cliente: ${venda.cliente}</p>
        <hr>
        <h3>Produtos</h3>
        ${venda.produtos.map(p=>`${p.descricao} - R$ ${p.total.toFixed(2)}<br>`).join("")}
        <hr>
        <h3>Total: R$ ${venda.total.toFixed(2)}</h3>
    `);
}

function mostrarVenda(){
    telaVenda.classList.remove("hidden");
    telaHistorico.classList.add("hidden");
}

function mostrarHistorico(){
    telaVenda.classList.add("hidden");
    telaHistorico.classList.remove("hidden");
    renderHistorico();
}

</script>

</body>
</html>
